<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>70城房价数据大屏 · 国家统计局</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
  background: #0a0e17;
  color: #e1e8ed;
  min-height: 100vh;
  overflow-x: hidden;
}
a { color: #4fc3f7; text-decoration: none; }
a:hover { text-decoration: underline; }

/* ====== Header ====== */
.header {
  background: linear-gradient(135deg, #0a1628 0%, #0f1f3d 50%, #0a1628 100%);
  padding: 16px 24px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid #1a2a4a;
  flex-wrap: wrap; gap: 10px;
}
.header h1 {
  font-size: 20px; color: #fff;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #4fc3f7, #81c784);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header .subtitle { color: #5a7a9a; font-size: 13px; }
.header .period-info { color: #4a6a8a; font-size: 12px; }

/* ====== Term Legend ====== */
.term-bar {
  background: #0d1a2e; padding: 8px 24px;
  display: flex; gap: 24px; flex-wrap: wrap;
  border-bottom: 1px solid #15223a;
  font-size: 12px;
}
.term-item { color: #6a8aaa; cursor: help; border-bottom: 1px dashed #3a5a7a; }
.term-item strong { color: #8ab4f8; }

/* ====== Control Bar ====== */
.control-bar {
  background: #0d1a2e;
  padding: 10px 24px; display: flex; align-items: center;
  gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #15223a;
}
.control-bar label { color: #6a8aaa; font-size: 13px; white-space: nowrap; }
.control-bar select, .control-bar button {
  padding: 6px 14px; border-radius: 6px; border: 1px solid #1a3050;
  background: #0f1f3d; color: #c0d0e0; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.control-bar select:hover, .control-bar button:hover { border-color: #2a5090; background: #152545; }
.control-bar button.active { background: #1e88e5; color: #fff; border-color: #1e88e5; }

.time-slider-container {
  flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px;
}
.time-slider-container input[type="range"] {
  flex: 1; height: 4px; -webkit-appearance: none;
  background: linear-gradient(90deg, #1a3050, #4fc3f7);
  border-radius: 2px; outline: none;
}
.time-slider-container input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: #4fc3f7; cursor: pointer;
  border: 2px solid #0a1628;
}
.time-label { color: #4fc3f7; font-size: 14px; font-weight: 600; min-width: 80px; text-align: center; }
.play-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: #1e88e5; color: #fff; border: none;
  font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
}
.play-btn:hover { background: #1976d2; }

/* ====== KPI Cards ====== */
.up { color: #ef4444; }
.down { color: #22c55e; }
.flat { color: #6a8aaa; }

/* ====== Main Layout ====== */
.main-grid {
  display: grid; grid-template-columns: 2fr 1fr;
  gap: 12px; padding: 0 24px 12px;
}
.left-col { display: flex; flex-direction: column; gap: 12px; }
.right-col { display: flex; flex-direction: column; gap: 12px; }

.panel {
  background: #0d1a2e; border: 1px solid #1a3050;
  border-radius: 10px; overflow: hidden;
}
.panel-title {
  padding: 10px 16px; font-size: 13px; color: #6a8aaa;
  border-bottom: 1px solid #1a3050;
  display: flex; justify-content: space-between; align-items: center;
}
.panel-title .badge {
  background: #1a3050; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; color: #8ab4f8;
}

#map-panel { flex: 1; min-height: 380px; }
#trend-panel { height: 300px; }
#table-panel { flex: 1; min-height: 260px; }

/* ====== Focus Cities ====== */
.focus-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  padding: 10px 16px;
}
.focus-item {
  text-align: center; padding: 8px; border-radius: 8px;
  background: #0f1f3d; border: 1px solid #1a3050;
}
.focus-item .city-name { font-size: 14px; font-weight: 600; color: #fbbf24; }
.focus-item .trend-line { height: 40px; margin-top: 4px; }

/* ====== Data Table ====== */
.table-wrap { max-height: 250px; overflow-y: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { 
  background: #0a1628; color: #6a8aaa; padding: 6px 8px;
  text-align: center; border-bottom: 1px solid #1a3050; position: sticky; top: 0;
  cursor: help; border-bottom: 1px dashed #3a5a7a;
}
td { padding: 5px 8px; text-align: center; border-bottom: 1px solid #111e30; }
tr:hover { background: #152545; }
.city-focus td { color: #fbbf24; font-weight: 600; }
.city-tag:hover { opacity: 0.9; }
.mf-btn.active { background: #1a3050 !important; border-color: #2a5090 !important; font-weight:600; }
.mf-btn:hover { border-color: #2a5090 !important; }
.highlight-cell { font-weight: 700; }

/* ====== Tooltip ====== */
.custom-tooltip {
  display: none; position: fixed;
  background: #0f1f3d; border: 1px solid #2a5090;
  border-radius: 8px; padding: 10px 14px;
  font-size: 13px; line-height: 1.5;
  max-width: 320px; z-index: 9999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
.custom-tooltip strong { color: #4fc3f7; }
.custom-tooltip.show { display: block; }

/* ====== Loading ====== */
.loading-state {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: #4a6a8a; font-size: 14px;
}

/* ====== Responsive ====== */
@media (max-width: 900px) {
  .main-grid { grid-template-columns: 1fr; }
  .focus-grid { grid-template-columns: repeat(2, 1fr); }
  .header h1 { font-size: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏠 70城房价数据大屏</h1>
    <div class="subtitle">国家统计局 · 70个大中城市商品住宅销售价格指数</div>
  </div>
  <div class="period-info" id="header-period">加载中...</div>
</div>

<div class="term-bar">
  <span class="term-item" onmouseover="showTip(event,'📊 <strong>环比</strong> — 跟上个月比<br>比如：本月房价 100.4 = 比上个月涨了 0.4%<br>大于100=涨，小于100=跌')" onmouseout="hideTip()">📊 环比 = 跟上个月比</span>
  <span class="term-item" onmouseover="showTip(event,'📈 <strong>同比</strong> — 跟去年同月比<br>比如：本月同比 95.0 = 比去年同月跌了 5.0%<br>大于100=涨，小于100=跌')" onmouseout="hideTip()">📈 同比 = 跟去年同月比</span>
  <span class="term-item" onmouseover="showTip(event,'📌 <strong>定基</strong> — 跟2020年比<br>以2020年为基准(100)，看累计涨跌<br>比如：定基 92.0 = 比2020年跌了 8.0%')" onmouseout="hideTip()">📌 定基 = 跟2020年基准比</span>
  <span class="term-item" onmouseover="showTip(event,'🔵 <strong>图中颜色</strong><br>🔴 红色 = 涨 <span style=\"color:#22c55e\">🟢 绿色</span> = 跌<br>⚪ 灰色 = 基本持平<br>气泡越大 = 涨/跌幅度越大')" onmouseout="hideTip()">🎨 图中颜色含义</span>
</div>

<div class="control-bar">
  <label>类型：</label>
  <button class="active" id="btn-new" onclick="switchType('new_house')">🏗️ 新房</button>
  <button id="btn-second" onclick="switchType('second_hand')">🏠 二手房</button>
  <label style="margin-left:8px;">维度：</label>
  <button class="active" id="btn-hb" onclick="switchMetric('环比')" title="环比 = 跟上个月比">环比</button>
  <button id="btn-tb" onclick="switchMetric('同比')" title="同比 = 跟去年同月比">同比</button>
  <button id="btn-dj" onclick="switchMetric('定基')" title="定基 = 跟2020年基准比">定基</button>

  <div class="time-slider-container">
    <span class="time-label" id="time-label">2021-07</span>
    <input type="range" id="time-slider" min="0" max="0" value="0" oninput="onTimeChange()">
    <button class="play-btn" id="play-btn" onclick="togglePlay()" title="播放">▶</button>
  </div>
</div>

<div class="main-grid">
  <div class="left-col">
    <div class="panel" id="map-panel">
      <div class="panel-title">📍 全国房价地图 <span class="badge" id="map-badge">2026年4月</span></div>
      <div style="padding:4px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #1a3050;flex-wrap:wrap;font-size:11px;">
        <span style="color:#6a8aaa;">筛选：</span>
        <button class="mf-btn active" id="mf-all" onclick="setMapFilter('all')" style="padding:2px 10px;border-radius:10px;border:1px solid #1a3050;background:transparent;color:#c0d0e0;cursor:pointer;">全部</button>
        <button class="mf-btn" id="mf-up" onclick="setMapFilter('up')" style="padding:2px 10px;border-radius:10px;border:1px solid #1a3050;background:transparent;color:#ef4444;cursor:pointer;">⬆ 上涨</button>
        <button class="mf-btn" id="mf-down" onclick="setMapFilter('down')" style="padding:2px 10px;border-radius:10px;border:1px solid #1a3050;background:transparent;color:#22c55e;cursor:pointer;">⬇ 下跌</button>
        <span id="map-count" style="color:#4a6a8a;font-size:11px;"></span>
        <span style="flex:1;"></span>
        <button onclick="resetMapView()" style="padding:2px 8px;border-radius:10px;border:1px solid #1a3050;background:transparent;color:#6a8aaa;cursor:pointer;" title="重置缩放">⟲</button>
        <button onclick="zoomMapBy(0.7)" style="padding:2px 8px;border-radius:10px;border:1px solid #1a3050;background:transparent;color:#6a8aaa;cursor:pointer;font-size:14px;" title="缩小">−</button>
        <button onclick="zoomMapBy(1.3)" style="padding:2px 8px;border-radius:10px;border:1px solid #1a3050;background:transparent;color:#6a8aaa;cursor:pointer;font-size:14px;" title="放大">+</button>
      </div>
      <div id="map-container" style="width:100%;height:calc(100% - 72px);min-height:340px;"><div class="loading-state">⏳ 加载中...</div></div>
    </div>
    <div class="panel" id="trend-panel">
      <div class="panel-title" onmouseover="showTip(event,'<strong>累积价格指数怎么算的？</strong><br><br>🔢 <strong>公式</strong>:<br>2011年1月 = <strong>1.0</strong>（起点）<br>下个月 = 1.0 × (本月环比÷100)<br>再下个月 = 上个月结果 × (本月环比÷100)<br><br>📖 <strong>举例</strong>:<br>杭州 2011-01 = <strong>1.000</strong><br>环比 100.4 → ×1.004 = <strong>1.004</strong><br>环比 100.5 → ×1.005 = <strong>1.009</strong><br>14年后 → 累积 <strong>1.35</strong>（涨了35%）<br><br>📉 如果 <strong>小于1.0</strong> = 比2011年跌了<br>📈 如果 <strong>大于1.0</strong> = 比2011年涨了')" onmouseout="hideTip()">📈 累积价格指数 <span class="badge">起点1.0 → 每月×环比÷100</span></div>
      <div style="padding:4px 12px 6px;font-size:12px;color:#6a8aaa;border-bottom:1px solid #1a3050;display:flex;align-items:center;flex-wrap:wrap;gap:4px;">
        <span style="white-space:nowrap;">🔍 城市：</span>
        <div id="city-tags" style="display:flex;flex-wrap:wrap;gap:3px;flex:1;"></div>
        <div style="position:relative;">
          <input type="text" id="city-search" placeholder="+ 输入城市名添加" 
            style="width:130px;padding:3px 8px;border-radius:12px;border:1px solid #1a3050;background:#0f1f3d;color:#c0d0e0;font-size:11px;outline:none;"
            oninput="onCitySearchInput()" onkeydown="onCitySearchKey(event)" onblur="setTimeout(hideCityDropdown,200)" onfocus="onCitySearchInput()">
          <div id="city-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;max-height:200px;overflow-y:auto;background:#0f1f3d;border:1px solid #1a3050;border-radius:6px;z-index:100;margin-top:2px;"></div>
        </div>
      </div>
      <div id="trend-container" style="width:100%;height:calc(100% - 36px);"></div>
    </div>
  </div>
  <div class="right-col">
    <div class="panel" id="table-panel" style="flex:1;">
      <div class="panel-title">📋 全部城市数据 <span class="badge" id="table-badge">70城</span></div>
      <div class="table-wrap" id="data-table-wrap">
        <table>
          <thead><tr>
            <th title="城市名称">城市</th>
            <th title="环比 = 跟上个月相比的涨跌百分比">环比(月)</th>
            <th title="同比 = 跟去年同月相比的涨跌百分比">同比(年)</th>
            <th title="定基 = 跟2020年基准(100)相比的累计变化">定基</th>
          </tr></thead>
          <tbody id="data-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Custom tooltip -->
<div class="custom-tooltip" id="tooltip"></div>

<script>
// ========== CONSTANTS ==========
const FOCUS = ['杭州', '大连', '哈尔滨', '厦门'];
const CITY_COORDS = {
  北京:[116.407,39.904],天津:[117.190,39.125],石家庄:[114.514,38.042],唐山:[118.180,39.630],
  秦皇岛:[119.600,39.935],包头:[109.840,40.657],太原:[112.549,37.857],呼和浩特:[111.751,40.842],
  沈阳:[123.431,41.806],大连:[121.615,38.914],长春:[125.324,43.886],哈尔滨:[126.642,45.756],
  上海:[121.473,31.230],南京:[118.767,32.041],杭州:[120.155,30.274],宁波:[121.544,29.868],
  合肥:[117.283,31.861],福州:[119.296,26.074],厦门:[118.089,24.479],南昌:[115.857,28.683],
  济南:[117.120,36.651],青岛:[120.355,36.083],郑州:[113.665,34.757],武汉:[114.298,30.584],
  长沙:[112.979,28.213],广州:[113.264,23.129],深圳:[114.054,22.521],南宁:[108.366,22.817],
  海口:[110.330,20.022],重庆:[106.504,29.533],成都:[104.066,30.573],贵阳:[106.713,26.578],
  昆明:[102.712,25.040],西安:[108.940,34.262],兰州:[103.823,36.058],西宁:[101.779,36.623],
  银川:[106.271,38.466],乌鲁木齐:[87.617,43.792],丹东:[124.356,40.000],锦州:[121.130,41.095],
  吉林:[126.550,43.838],牡丹江:[129.608,44.583],无锡:[120.305,31.570],徐州:[117.188,34.271],
  扬州:[119.414,32.394],温州:[120.699,27.994],金华:[119.574,29.105],蚌埠:[117.389,32.916],
  安庆:[117.043,30.506],泉州:[118.589,24.908],九江:[115.952,29.720],赣州:[114.935,25.831],
  烟台:[121.391,37.463],济宁:[116.587,35.415],洛阳:[112.454,34.620],平顶山:[113.307,33.735],
  宜昌:[111.300,30.728],襄阳:[112.144,32.042],岳阳:[113.129,29.366],常德:[111.699,29.031],
  韶关:[113.596,24.801],湛江:[110.357,21.270],惠州:[114.410,23.113],桂林:[110.290,25.276],
  北海:[109.119,21.475],三亚:[109.508,18.247],泸州:[105.443,28.889],南充:[106.083,30.795],
  遵义:[106.927,27.725],大理:[100.224,25.589]
};

// ========== STATE ==========
let data = null;
let currentType = 'new_house';
let currentMetric = '环比';
let currentMonthIdx = 0;
let months = [];
let isPlaying = false;
let playTimer = null;
let mapChart = null, trendChart = null;

// ========== LOAD ==========
async function loadData() {
  try {
    const resp = await fetch('historical_data.json');
    data = await resp.json();
    months = Object.keys(data.months).sort();
    
    document.getElementById('header-period').textContent = 
      `${data.meta.date_range[0]} ~ ${data.meta.date_range[1]} · ${months.length}个月`;
    
    const slider = document.getElementById('time-slider');
    slider.max = months.length - 1;
    slider.value = months.length - 1;
    currentMonthIdx = months.length - 1;
    
    document.getElementById('time-label').textContent = months[currentMonthIdx];
    
    initCharts();
    setTimeout(function() {
      ['杭州', '大连', '哈尔滨', '厦门'].forEach(function(c) { addCity(c); });
    }, 300);
    updateAll();
  } catch(e) {
    document.getElementById('map-container').innerHTML = 
      `<div class="loading-state">❌ 数据加载失败: ${e.message}</div>`;
  }
}

// ========== INIT CHARTS ==========
async function initCharts() {
  let chinaJson;
  try {
    const resp = await fetch('china.json');
    chinaJson = await resp.json();
  } catch(e) {
    document.getElementById('map-container').innerHTML = '<div class="loading-state">❌ 地图加载失败</div>';
    return;
  }
  echarts.registerMap('china', chinaJson);
  
  mapChart = echarts.init(document.getElementById('map-container'), 'dark');
  trendChart = echarts.init(document.getElementById('trend-container'), 'dark');
  
  window.addEventListener('resize', () => {
    mapChart?.resize();
    trendChart?.resize();
  });
  
  updateAll();
}

// ========== GET DATA ==========
function getMonthData(type, metric) {
  const key = months[currentMonthIdx];
  const m = data.months[key];
  if (!m) return [];
  const cities = m[type] || [];
  return cities.map(c => ({
    city: c.city,
    metric: parseFloat(c[metric]) || 100,
    环比: parseFloat(c['环比']) || 100,
    同比: parseFloat(c['同比']) || 100,
    定基: parseFloat(c['定基']) || 100
  }));
}

// removed
function getSelectedCity() {
}

// ========== UPDATE ALL ==========
function updateAll() {
  const key = months[currentMonthIdx];
  const m = data.months[key];
  if (!m) return;
  
  const badgeText = m.period || key;
  document.getElementById('map-badge').textContent = badgeText;
  document.getElementById('table-badge').textContent = `${(m.new_house?.length || 0)}城`;
  document.getElementById('time-label').textContent = key;
  
  renderMap();
  renderTrend();
  renderTable();
}

// ========== CITY MAP (省份底色 + 城市色块) ==========
let mapFilter = 'all';

function setMapFilter(mode) {
  mapFilter = mode;
  document.querySelectorAll('.mf-btn').forEach(function(b) {
    b.classList.remove('active');
    b.style.background = 'transparent';
  });
  var btn = document.getElementById('mf-' + mode);
  if (btn) { btn.classList.add('active'); btn.style.background = '#1a3050'; }
  renderMap();
}

function toggleMapFilter(mode) {
  if (mapFilter === mode) setMapFilter('all');
  else setMapFilter(mode);
}

function resetMapView() {
  if (mapChart) mapChart.dispatchAction({ type: 'restore' });
}

function zoomMapBy(scale) {
  if (!mapChart) return;
  try {
    var opt = mapChart.getOption();
    var cur = (opt && opt.series && opt.series[0] && opt.series[0].zoom) ? opt.series[0].zoom : 1;
    mapChart.dispatchAction({ type: 'geoZoom', zoom: cur * scale });
  } catch(e) {}
}

const PROVINCE_MAP = {
  '北京':'北京市','天津':'天津市','上海':'上海市','重庆':'重庆市',
  '石家庄':'河北省','唐山':'河北省','秦皇岛':'河北省',
  '太原':'山西省','呼和浩特':'内蒙古自治区','包头':'内蒙古自治区',
  '沈阳':'辽宁省','大连':'辽宁省','丹东':'辽宁省','锦州':'辽宁省',
  '长春':'吉林省','吉林':'吉林省',
  '哈尔滨':'黑龙江省','牡丹江':'黑龙江省',
  '南京':'江苏省','无锡':'江苏省','徐州':'江苏省','扬州':'江苏省',
  '杭州':'浙江省','宁波':'浙江省','温州':'浙江省','金华':'浙江省',
  '合肥':'安徽省','蚌埠':'安徽省','安庆':'安徽省',
  '福州':'福建省','厦门':'福建省','泉州':'福建省',
  '南昌':'江西省','九江':'江西省','赣州':'江西省',
  '济南':'山东省','青岛':'山东省','烟台':'山东省','济宁':'山东省',
  '郑州':'河南省','洛阳':'河南省','平顶山':'河南省',
  '武汉':'湖北省','宜昌':'湖北省','襄阳':'湖北省',
  '长沙':'湖南省','岳阳':'湖南省','常德':'湖南省',
  '广州':'广东省','深圳':'广东省','韶关':'广东省','湛江':'广东省','惠州':'广东省',
  '南宁':'广西壮族自治区','桂林':'广西壮族自治区','北海':'广西壮族自治区',
  '海口':'海南省','三亚':'海南省',
  '成都':'四川省','泸州':'四川省','南充':'四川省',

  '银川':'宁夏回族自治区','乌鲁木齐':'新疆维吾尔自治区'
};

function colorFor(val) {
  var d = val - 100;
  if (d >= 2) return '#dc2626';
  if (d >= 1) return '#ef4444';
  if (d >= 0.3) return '#fca5a5';
  if (d > -0.3) return '#6b7280';
  if (d > -1) return '#86efac';
  if (d > -2) return '#22c55e';
  return '#16a34a';
}

function renderMap() {
  var entries = getMonthData(currentType, currentMetric);
  var allEntries = entries;
  
  // Update count display
  var upCount = allEntries.filter(function(e) { return e.metric > 100; }).length;
  var downCount = allEntries.filter(function(e) { return e.metric < 100; }).length;
  var countEl = document.getElementById('map-count');
  if (countEl) countEl.innerHTML = '<span style="color:#ef4444;">⬆ ' + upCount + '</span> <span style="color:#4a6a8a;">/</span> <span style="color:#22c55e;">⬇ ' + downCount + '</span>';
  
  // Apply filter
  if (mapFilter === 'up') {
    entries = entries.filter(function(e) { return e.metric > 100; });
  } else if (mapFilter === 'down') {
    entries = entries.filter(function(e) { return e.metric < 100; });
  }
  
  // Province average
  var provSum = {}, provCnt = {};
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var p = PROVINCE_MAP[e.city];
    if (!p) continue;
    if (!provSum[p]) { provSum[p] = 0; provCnt[p] = 0; }
    provSum[p] += e.metric;
    provCnt[p]++;
  }
  
  var mapData = [];
  for (var p in provSum) {
    mapData.push({ name: p, value: +(provSum[p] / provCnt[p]).toFixed(1), itemStyle: { color: colorFor(provSum[p] / provCnt[p]) } });
  }
  
  // City scatter
  var scatter = [];
  for (var i = 0; i < entries.length; i++) {
    var d = entries[i];
    var coord = CITY_COORDS[d.city];
    if (!coord) continue;
    scatter.push({ name: d.city, value: [coord[0], coord[1], d.metric] });
  }
  
  var focusSet = new Set(getSelectedCities());
  var hasFocus = focusSet.size > 0;
  
  var option = {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        if (p.seriesIndex === 0) {
          if (!p.data) return p.name;
          var val = p.data.value;
          var cities = [];
          for (var i = 0; i < entries.length; i++) {
            if (PROVINCE_MAP[entries[i].city] === p.name) cities.push(entries[i].city);
          }
          return '<strong>' + p.name + '</strong><br/><span style="font-size:22px;font-weight:700;color:' + colorFor(val) + '">' + (val > 100 ? '↑' : val < 100 ? '↓' : '→') + ' ' + (val-100).toFixed(1) + '%</span><br/><span style="color:#5a7a9a;font-size:11px">含 ' + cities.join('、') + '</span>';
        } else {
          var entry = null;
          for (var i = 0; i < entries.length; i++) { if (entries[i].city === p.name) { entry = entries[i]; break; } }
          if (!entry) return p.name;
          var hb = entry['环比'], tb = entry['同比'];
          return '<strong>' + p.name + '</strong><br/><span style="font-size:18px;font-weight:700;color:' + colorFor(hb) + '">' + (hb > 100 ? '↑ +' : hb < 100 ? '↓ ' : '→ ') + (hb-100).toFixed(1) + '%</span><br/><span style="color:#5a7a9a;font-size:11px">同比: ' + (tb > 100 ? '↑ +' : tb < 100 ? '↓ ' : '→ ') + (tb-100).toFixed(1) + '%</span>';
        }
      },
      backgroundColor: 'rgba(10,14,23,0.9)', borderColor: '#1a3050',
      textStyle: { color: '#e1e8ed', fontSize: 12 }
    },
    series: [{
      name: '省份',
      type: 'map', map: 'china',
      roam: true, zoom: 1.2,
      label: { show: false },
      itemStyle: { areaColor: '#1a2a3c', borderColor: '#2a4a6c', borderWidth: 0.5 },
      emphasis: { label: { show: false } },
      data: mapData,
      z: 0
    }, {
      name: '城市',
      type: 'scatter',
      coordinateSystem: 'geo',
      data: scatter.map(function(d) {
        var isFocus = hasFocus && focusSet.has(d.name);
        return {
          name: d.name, value: d.value,
          symbolSize: isFocus ? 22 : 16,
          itemStyle: { color: colorFor(d.value[2]), borderColor: isFocus ? '#fbbf24' : '#0a0e17', borderWidth: isFocus ? 3 : 2 },
          label: { show: true, formatter: d.name, position: 'right', color: isFocus ? '#fbbf24' : '#c0d0e0', fontSize: isFocus ? 11 : 9, fontWeight: isFocus ? 'bold' : 'normal' }
        };
      }),
      z: 3
    }]
  };
  
  // Focus pulse layer
  if (hasFocus) {
    var fs = [];
    for (var i = 0; i < scatter.length; i++) {
      if (focusSet.has(scatter[i].name)) {
        fs.push({ name: scatter[i].name, value: scatter[i].value, symbolSize: 24, itemStyle: { color: colorFor(scatter[i].value[2]), borderColor: '#fbbf24', borderWidth: 3 } });
      }
    }
    if (fs.length > 0) {
      option.series.push({
        name: '关注',
        type: 'effectScatter', coordinateSystem: 'geo',
        data: fs,
        rippleEffect: { brushType: 'stroke', period: 4, scale: 2.5 },
        z: 4
      });
    }
  }
  
  mapChart.setOption(option, true);
}

// ========== TREND CHART (累积价格指数: 2011年1月=1.0) ==========
// 用环比逐月连乘，算出以2011年1月为基准1.0的累积价格指数
// 比如：这个月涨1%→×1.01，下个月再涨1%→再×1.01=1.0201
function computeCumulativeIndex(city) {
  const trend = data.city_trends[city];
  if (!trend) return null;
  const key = currentType === 'new_house' ? '新房' : '二手';
  const metricKey = `${key}环比`;  // 用环比连乘
  const points = trend[metricKey] || [];
  
  // Build map: month → 环比值
  const hbMap = {};
  for (const p of points) {
    if (p.value) hbMap[p.month] = p.value;
  }
  
  // Find the index of 2011-01 in months array (数据起点)
  const baseMonth = '2011-01';
  const baseIdx = months.indexOf(baseMonth);
  if (baseIdx < 0) return null;  // 没有2011年数据
  
  // Compute cumulative index
  const result = new Array(months.length).fill(null);
  
  // Set 2011-01 as base (= 1.0)
  result[baseIdx] = 1.0;
  
  // Forward: months after 2011-01
  for (let i = baseIdx + 1; i < months.length; i++) {
    const hb = hbMap[months[i]];  // 这个月的环比 = 跟上个月比
    if (result[i-1] !== null) {
      if (hb) {
        result[i] = result[i-1] * (hb / 100);
      } else {
        // 数据缺失：用上个月的值续上（折线保持不断）
        result[i] = result[i-1];
      }
    }
  }
  
  // Backward: months before 2011-01
  for (let i = baseIdx; i > 0; i--) {
    const hb = hbMap[months[i]];  // 这个月的环比 = 跟上个月比
    // 要算上个月的累积：month[i]的环比是相对于month[i-1]
    // result[i-1] = result[i] / (hb/100)
    if (result[i] !== null) {
      if (hb) {
        result[i-1] = result[i] / (hb / 100);
      } else {
        // 数据缺失：用这个月的值续上
        result[i-1] = result[i];
      }
    }
  }
  
  return result;
}

// ========== CITY SELECTOR (Tag + Search) ==========
const CITY_NAMES = Object.keys(CITY_COORDS).sort();
const CITY_PALETTE = ['#fbbf24','#22c55e','#ef4444','#3b82f6','#a78bfa','#f472b6','#34d399','#f97316','#818cf8','#e879f9','#2dd4bf','#fb923c','#67e8f9','#a3e635','#facc15','#c084fc','#f87171','#38bdf8','#4ade80','#fbbf24'];

function getSelectedCities() {
  return Array.from(document.querySelectorAll('#city-tags .city-tag'))
    .map(el => el.dataset.city);
}

function addCity(city) {
  if (!city || getSelectedCities().includes(city)) return;
  const idx = document.querySelectorAll('#city-tags .city-tag').length;
  const color = CITY_PALETTE[idx % CITY_PALETTE.length];
  const tag = document.createElement('span');
  tag.className = 'city-tag';
  tag.dataset.city = city;
  tag.style.cssText = 'display:inline-flex;align-items:center;gap:3px;padding:2px 6px 2px 8px;border-radius:10px;font-size:11px;background:' + color + '22;border:1px solid ' + color + '44;color:' + color + ';cursor:default;';
  tag.innerHTML = city + '<span id="close-' + city + '" style="cursor:pointer;opacity:0.6;font-size:13px;line-height:1;">\u2715</span>';
  document.getElementById('city-tags').appendChild(tag);
  document.getElementById('close-' + city).onclick = function() { removeCity(city); };
  renderTrend();
  renderMap();
  document.getElementById('city-search').value = '';
  document.getElementById('city-dropdown').style.display = 'none';
}

function removeCity(city) {
  const tag = document.querySelector('#city-tags .city-tag[data-city="' + city + '"]');
  if (tag) tag.remove();
  renderTrend();
  renderMap();
}

function onCitySearchInput() {
  const val = document.getElementById('city-search').value.trim();
  const dd = document.getElementById('city-dropdown');
  if (!val) { dd.style.display = 'none'; return; }
  const selected = getSelectedCities();
  const matched = CITY_NAMES.filter(function(c) { return c.includes(val) && !selected.includes(c); }).slice(0, 15);
  if (matched.length === 0) { dd.style.display = 'none'; return; }
  dd.innerHTML = '';
  for (var i = 0; i < matched.length; i++) {
    var item = document.createElement('div');
    item.textContent = matched[i];
    item.style.cssText = 'padding:4px 10px;cursor:pointer;color:#c0d0e0;font-size:12px;border-bottom:1px solid #1a3050;';
    item.addEventListener('mousedown', function(e) { e.preventDefault(); addCity(this.textContent); }.bind(item));
    item.addEventListener('mouseover', function() { this.style.background = '#1a3050'; });
    item.addEventListener('mouseout', function() { this.style.background = ''; });
    dd.appendChild(item);
  }
  dd.style.display = 'block';
}

function onCitySearchKey(e) {
  if (e.key === 'Enter' && document.getElementById('city-dropdown').style.display !== 'none') {
    var first = document.querySelector('#city-dropdown div');
    if (first) addCity(first.textContent);
  }
  if (e.key === 'Escape') document.getElementById('city-dropdown').style.display = 'none';
}

function hideCityDropdown() {
  document.getElementById('city-dropdown').style.display = 'none';
}

function renderTrend() {
  const allCities = getSelectedCities();
  if (allCities.length === 0) {
    trendChart.setOption({series: []}, true);
    return;
  }
  
  const series = allCities.map(city => {
    const cumIndex = computeCumulativeIndex(city);
    if (!cumIndex) return null;
    
    return {
      name: city,
      type: 'line',
      smooth: true,
      symbol: 'circle', symbolSize: 4,
      data: cumIndex,
      lineStyle: { width: 2.5 },
      areaStyle: { opacity: 0.05 },
      emphasis: { focus: 'series' }
    };
  }).filter(Boolean);
  
  const colorList = CITY_PALETTE;
  series.forEach((s, i) => { 
    s.itemStyle = { color: colorList[i % colorList.length] }; 
  });
  
  // Mark 2015 base with a dashed line
  const baseIdx = months.indexOf('2015-01');
  
  const option = {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis',
      formatter: params => {
        const idx = params[0].dataIndex;
        let html = `<strong>${months[idx]}</strong><br/>
          <span style="color:#5a7a9a;font-size:11px">2011年1月 = 1.0（数据起点）</span><br/>`;
        params.sort((a, b) => b.data - a.data);
        params.forEach(p => {
          const v = p.data;
          if (v === null) return;
          const arrow = v > 1.0 ? '↑' : v < 1.0 ? '↓' : '→';
          const pct = ((v - 1.0) * 100).toFixed(1);
          html += `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p.color};margin-right:4px"></span>${p.seriesName}: <strong>${arrow} ${pct > 0 ? '+' : ''}${pct}%</strong><br/>`;
        });
        html += `<span style="color:#5a7a9a;font-size:11px">数值=累积涨跌幅（2015年1月基准=1）</span>`;
        return html;
      },
      backgroundColor: 'rgba(10,14,23,0.9)', borderColor: '#1a3050',
      textStyle: { color: '#e1e8ed', fontSize: 12 }
    },
    legend: {
      data: allCities,
      textStyle: { color: '#6a8aaa', fontSize: 11 },
      bottom: 0,
      selector: [{ type: 'all', title: '全部' }, { type: 'inverse', title: '反选' }]
    },
    grid: { left: 55, right: 25, top: 20, bottom: 35 },
    xAxis: {
      type: 'category',
      data: months.map(m => m.slice(5)),
      axisLabel: { color: '#4a6a8a', fontSize: 9, interval: 11 },
      axisLine: { lineStyle: { color: '#1a3050' } },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value',
      axisLabel: { formatter: v => v.toFixed(2), color: '#4a6a8a', fontSize: 10 },
      axisLine: { show: false },
      splitLine: { lineStyle: { color: '#111e30' } },
      scale: true,
      min: 'dataMin',
      max: 'dataMax'
    },
    series: series.map((s, i) => ({
      ...s,
      markLine: i === 0 ? {
        silent: true,
        symbol: 'none',
        data: [
          { yAxis: 1.0, label: { formatter: '基准 1.0', color: '#4a6a8a', fontSize: 10, position: 'insideEndTop' }, lineStyle: { color: '#4a6a8a', type: 'dashed', width: 1 } },
          ...(baseIdx >= 0 ? [{ xAxis: baseIdx, label: { formatter: '2011→', color: '#4fc3f7', fontSize: 11, position: 'start' }, lineStyle: { color: '#4fc3f7', type: 'dashed', width: 1 } }] : [])
        ]
      } : undefined
    }))
  };
  
  trendChart.setOption(option, true);
}

// ========== TABLE ==========
function renderTable() {
  const entries = getMonthData(currentType, currentMetric);
  const focusSet = new Set(getSelectedCities());
  const tbody = document.getElementById('data-body');
  tbody.innerHTML = entries.map(d => {
    const hb = d['环比'], tb = d['同比'];
    const hbCls = hb > 100 ? 'up' : hb < 100 ? 'down' : 'flat';
    const tbCls = tb > 100 ? 'up' : tb < 100 ? 'down' : 'flat';
    const dj = d['定基'];
    const djCls = dj > 100 ? 'up' : dj < 100 ? 'down' : 'flat';
    return `<tr class="${focusSet.has(d.city) ? 'city-focus' : ''}">
      <td>${focusSet.has(d.city) ? '⭐ ' : ''}${d.city}</td>
      <td class="${hbCls} highlight-cell" title="比上个月: ${hb > 100 ? '+':''}${(hb - 100).toFixed(1)}%">${(hb - 100).toFixed(1)}%</td>
      <td class="${tbCls}" title="比去年同月: ${tb > 100 ? '+':''}${(tb - 100).toFixed(1)}%">${(tb - 100).toFixed(1)}%</td>
      <td class="${djCls}" title="比2020年基准: ${dj > 100 ? '+':''}${(dj - 100).toFixed(1)}%">${(dj - 100).toFixed(1)}%</td>
    </tr>`;
  }).join('');
}

// ========== SLIDER & PLAY ==========
function onTimeChange() {
  currentMonthIdx = parseInt(document.getElementById('time-slider').value);
  document.getElementById('time-label').textContent = months[currentMonthIdx];
  updateAll();
}

function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    playTimer = setInterval(() => {
      const slider = document.getElementById('time-slider');
      let val = parseInt(slider.value) + 1;
      if (val >= months.length) { val = 0; }
      slider.value = val;
      onTimeChange();
    }, 800);
  } else {
    clearInterval(playTimer);
  }
}

// ========== CONTROLS ==========
function switchType(type) {
  currentType = type;
  document.getElementById('btn-new').className = type === 'new_house' ? 'active' : '';
  document.getElementById('btn-second').className = type === 'second_hand' ? 'active' : '';
  updateAll();
}

function switchMetric(metric) {
  currentMetric = metric;
  document.querySelectorAll('[id^="btn-"]').forEach(b => {
    if (b.id.match(/btn-(hb|tb|dj)/)) b.className = '';
  });
  document.getElementById(`btn-${metric === '环比' ? 'hb' : metric === '同比' ? 'tb' : 'dj'}`).className = 'active';
  updateAll();
}

function onCityChange() {
  const sel = getSelectedCity();
  if (sel !== 'all') {
    // If a specific city is selected, show its trend
  }
  renderMap();
  renderTrend();
}

function showTip(e, html) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = html;
  tip.className = 'custom-tooltip show';
  const x = Math.min(e.clientX + 10, window.innerWidth - 340);
  const y = Math.min(e.clientY + 10, window.innerHeight - 120);
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
function hideTip() {
  document.getElementById('tooltip').className = 'custom-tooltip';
}
